name: Build and Deploy

on:
  push:
    branches: [main]

env:
  IMAGE: mahirberkan/learning-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE }}:latest

      - name: Update gitops repo
        run: |
          git clone https://x-access-token:${{ secrets.GIT_TOKEN }}@github.com/mahirberkano/learning-app-gitops.git
          cd learning-app-gitops
          sed -i "s/tag: .*/tag: \"${{ steps.tag.outputs.tag }}\"/" charts/learning-app/values.yaml
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git commit -am "ci: bump image to ${{ steps.tag.outputs.tag }}"
          git push
